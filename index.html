<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kurukulle Sadhana</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Jomolhari&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'monk-red': '#8B0000',     // Deep dark red
              'monk-crimson': '#6B0F1A', // Richer burgundy for accents
              'monk-saffron': '#FF9933', // Golden yellow/orange
              'monk-gold': '#D4A84B',    // Muted antique gold
              'parchment': '#FDFBF7',    // Light paper background
              'parchment-dark': '#1C1917', // Dark mode background
              'stone-850': '#1f1c1a',
            },
            fontFamily: {
              serif: ['"EB Garamond"', 'serif'],
              tibetan: ['"Jomolhari"', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'mandala-spin': 'mandalaSpin 120s linear infinite',
              'aura-pulse': 'auraPulse 6s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              mandalaSpin: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
              auraPulse: {
                '0%, 100%': { opacity: '0.55', transform: 'scale(1)' },
                '50%': { opacity: '0.85', transform: 'scale(1.04)' },
              },
            }
          }
        }
      }
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      html {
        scroll-behavior: smooth;
      }

      /* Parchment-like radial tint layered behind content */
      body {
        background-image:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139, 0, 0, 0.05) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 50% 100%, rgba(212, 168, 75, 0.06) 0%, transparent 60%);
        background-attachment: fixed;
      }
      .dark body,
      html.dark body {
        background-image:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255, 153, 51, 0.07) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 50% 100%, rgba(139, 0, 0, 0.12) 0%, transparent 60%);
      }

      /* Mandala aura halo */
      .mandala-aura {
        background: radial-gradient(circle at center,
          rgba(255, 153, 51, 0.35) 0%,
          rgba(212, 168, 75, 0.25) 35%,
          rgba(139, 0, 0, 0.12) 60%,
          transparent 75%);
        filter: blur(18px);
      }
      .dark .mandala-aura {
        background: radial-gradient(circle at center,
          rgba(255, 153, 51, 0.45) 0%,
          rgba(212, 168, 75, 0.3) 35%,
          rgba(139, 0, 0, 0.2) 60%,
          transparent 75%);
      }

      /* Subtle gold decorative ring dashes */
      .ring-dashed-gold {
        background-image: repeating-conic-gradient(
          from 0deg,
          rgba(212, 168, 75, 0.55) 0deg 3deg,
          transparent 3deg 9deg
        );
        -webkit-mask: radial-gradient(circle, transparent 48%, black 49%, black 50%, transparent 51%);
                mask: radial-gradient(circle, transparent 48%, black 49%, black 50%, transparent 51%);
      }

      /* Mantra block ornamental gradient */
      .mantra-surface {
        background-image:
          linear-gradient(135deg, rgba(139, 0, 0, 0.06) 0%, rgba(212, 168, 75, 0.08) 100%);
      }
      .dark .mantra-surface {
        background-image:
          linear-gradient(135deg, rgba(139, 0, 0, 0.18) 0%, rgba(255, 153, 51, 0.08) 100%);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-parchment dark:bg-parchment-dark text-stone-800 dark:text-stone-200 antialiased selection:bg-monk-red/20 dark:selection:bg-monk-saffron/30">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
